# ~/.tmux.conf
# A starting point tuned for the workflow discussed: one session per project,
# panes for editor / test-watch / general shell.

# Use C-Space as prefix instead of C-b
unbind C-b
set -g prefix C-Space
bind C-Space send-prefix

# Mouse support (click to switch panes/resize) -- remove if you want fully keyboard-only
set -g mouse on

# Start windows/panes at 1, not 0 (keys are more natural)
set -g base-index 1
setw -g pane-base-index 1

# Faster escape time (fixes vim mode-switch lag inside tmux)
set -sg escape-time 10

# 256 / true color support, needed for catppuccin colorscheme to render right
set -g default-terminal "tmux-256color"
set -ag terminal-overrides ",xterm-256color:RGB"

# Pane splits that make sense: | and - instead of % and "
bind | split-window -h -c "#{pane_current_path}"
bind - split-window -v -c "#{pane_current_path}"
unbind '"'
unbind %

# Pane navigation with vim-style hjkl (prefix + h/j/k/l)
bind h select-pane -L
bind j select-pane -D
bind k select-pane -U
bind l select-pane -R

# Reload config without restarting tmux
bind r source-file ~/.tmux.conf \; display "Reloaded!"

# New panes/windows open in the same directory as the current one
bind c new-window -c "#{pane_current_path}"

# Larger scrollback for long test output
set -g history-limit 10000

# Theme: Catppuccin (Mocha)
set -g @catppuccin_flavor "mocha"
set -g @catppuccin_window_status_style "rounded"
set -g @catppuccin_date_time_text "%H:%M"

# Show the window NAME (#W), not the pane title (#T). Catppuccin defaults these
# to #T, which on macOS is the hostname (e.g. Youssoufs-MacBook-Pro.local) and
# hides the actual window name. #I is the window index.
set -g @catppuccin_window_text " #W"
set -g @catppuccin_window_current_text " #W"

# Catppuccin must be loaded before status-left/status-right are set, since
# those reference @catppuccin_status_* module variables it defines.
run '~/.tmux/plugins/tmux/catppuccin.tmux'

set -g status-left-length 100
set -g status-right-length 100
set -g status-left "#{E:@catppuccin_status_session}"
set -g status-right "#{E:@catppuccin_status_directory}"
set -ag status-right "#{E:@catppuccin_status_date_time}"

# List of plugins (installed/updated with prefix + I, TPM must be cloned first)
set -g @plugin 'tmux-plugins/tpm'
set -g @plugin 'catppuccin/tmux#v2.1.2'
set -g @plugin 'tmux-plugins/tmux-sensible'
set -g @plugin 'tmux-plugins/tmux-resurrect'
set -g @plugin 'tmux-plugins/tmux-continuum'
set -g @plugin 'tmux-plugins/tmux-yank'
set -g @plugin 'christoomey/vim-tmux-navigator'
set -g @plugin 'sainnhe/tmux-fzf'

# tmux-continuum: auto-save every 5 min, auto-restore last session on tmux start
set -g @continuum-restore 'on'
set -g @continuum-save-interval '5'

# tmux-fzf: open the fzf menu with prefix + F
set -g @tmux-fzf-launch-key 'F'

# Initialize TPM (keep this line at the very bottom of the file)
run '~/.tmux/plugins/tpm/tpm'
